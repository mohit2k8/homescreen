<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>FilmZilla 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<!-- ✅ PWA Support -->
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FilmZilla"/>
<meta name="theme-color" content="#FF2D6B"/>
<link rel="apple-touch-icon" href="logo.png"/>
<link rel="icon" type="image/png" href="logo.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:#000;font-family:'Inter',sans-serif;color:#fff}

/* ═══ PAGES ═══════════════════════════════════════════ */
.page{position:fixed;inset:0;z-index:1;transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);will-change:transform}
.page.hidden{transform:translateX(100%);pointer-events:none}

/* ═══ FEED ═══════════════════════════════════════════ */
#feed{height:100vh;height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
#feed::-webkit-scrollbar{display:none}
#cat-feed{height:100vh;height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
#cat-feed::-webkit-scrollbar{display:none}

/* ═══ CARD ═══════════════════════════════════════════ */
.card{position:relative;height:100vh;height:100dvh;width:100%;scroll-snap-align:start;overflow:hidden;background:#0a0a0a}
.card-bg{position:absolute;inset:0;background-size:cover;background-position:center 15%;transition:transform 8s ease}
.card.active .card-bg{transform:scale(1.04)}
.card-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,transparent 35%,rgba(0,0,0,0.45) 100%)}
.card-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,1.0) 0%,rgba(0,0,0,0.88) 18%,rgba(0,0,0,0.55) 38%,rgba(0,0,0,0.12) 58%,transparent 75%)}
.card-top{position:absolute;top:0;left:0;right:0;height:120px;background:linear-gradient(to bottom,rgba(0,0,0,0.55),transparent)}

/* ═══ TOP BAR ═════════════════════════════════════════ */
#topbar{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:11px 14px 8px;padding-top:max(11px,env(safe-area-inset-top))}
.logo-wrap{display:flex;align-items:center;gap:4px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#FF2D6B,#FF8C00);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:18px;height:18px}
.logo-text{font-family:'Bebas Neue',cursive;font-size:1.55rem;letter-spacing:2.5px;background:linear-gradient(90deg,#FF2D6B,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topright{display:flex;align-items:center;gap:9px}
.ticon{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,255,255,0.15);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.18s;flex-shrink:0}
.ticon:active{transform:scale(0.86)}
.ticon svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ticon.has-saved{border-color:#00E5FF;box-shadow:0 0 10px rgba(0,229,255,0.3)}
.ticon.has-saved svg{stroke:#00E5FF}

/* ═══ CATEGORY PAGE TOPBAR ════════════════════════════ */
#cat-topbar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;align-items:center;gap:12px;
  padding:11px 14px 8px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent);
}
.cat-back{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,255,255,0.15);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.cat-back svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.cat-title-bar{font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:1.5px}

/* ═══ BOTTOM CONTENT ══════════════════════════════════ */
.card-info{position:absolute;bottom:0;left:0;right:0;padding:0 68px max(60px,calc(40px + env(safe-area-inset-bottom))) 16px;z-index:10;max-height:65vh;display:flex;flex-direction:column;justify-content:flex-end}
.card-genres{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{font-size:0.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1.5px solid;backdrop-filter:blur(6px)}
.card-title{font-family:'Bebas Neue',cursive;font-size:clamp(1.85rem,6.5vw,3.2rem);line-height:1.02;color:#fff;letter-spacing:0.5px;margin-bottom:6px;text-shadow:0 2px 20px rgba(0,0,0,0.8)}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.mrating{color:#FFD600;font-weight:700;font-size:0.76rem}
.mdot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.3);flex-shrink:0}
.mmeta{font-size:0.71rem;color:rgba(255,255,255,0.5)}
.card-plot{font-size:0.81rem;line-height:1.58;color:rgba(255,255,255,0.7);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;font-weight:300}
.card-plot.open{display:block;-webkit-line-clamp:unset;overflow:visible}
.know-btn{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.22);border-radius:20px;padding:7px 15px;cursor:pointer;backdrop-filter:blur(10px);font-family:'Inter',sans-serif;transition:background 0.2s;flex-shrink:0;align-self:flex-start;margin-bottom:2px}
.know-btn:active{background:rgba(255,255,255,0.2)}
.detail-sheet{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.detail-sheet.open{max-height:280px}
.detail-box{background:rgba(0,0,0,0.7);backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:11px 13px;margin:8px 0 6px}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);gap:8px}
.drow:last-child{border-bottom:none}
.dlabel{font-size:0.64rem;color:rgba(255,255,255,0.32);flex-shrink:0}
.dval{font-size:0.71rem;color:rgba(255,255,255,0.82);font-weight:500;text-align:right}
.btn-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:4px}
.imdb-btn{display:inline-flex;align-items:center;gap:5px;background:#F5C518;color:#000;font-weight:800;font-size:0.73rem;padding:7px 15px;border-radius:20px;text-decoration:none}
.watch-btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(90deg,#E50914,#b00710);color:#fff;font-weight:800;font-size:0.73rem;padding:7px 15px;border-radius:20px;text-decoration:none;box-shadow:0 2px 12px rgba(229,9,20,0.4)}
.watch-btn svg{width:12px;height:12px;fill:#fff}

/* ═══ SIDE BUTTONS ════════════════════════════════════ */
.side-btns{position:absolute;right:12px;bottom:max(110px,calc(90px + env(safe-area-inset-bottom)));display:flex;flex-direction:column;align-items:center;gap:16px;z-index:11}
.sbtn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform 0.12s;user-select:none}
.sbtn:active{transform:scale(0.84)}
.sicon{width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,0.55);border:1.5px solid rgba(255,255,255,0.18);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.sicon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:all 0.2s}
.slabel{font-size:0.57rem;color:rgba(255,255,255,0.42);font-weight:600;letter-spacing:0.3px}
.sbtn.on-like .sicon{background:rgba(255,45,107,0.28);border-color:#FF2D6B;box-shadow:0 0 14px rgba(255,45,107,0.45)}
.sbtn.on-like .sicon svg{stroke:#FF2D6B;fill:rgba(255,45,107,0.3)}
.sbtn.on-save .sicon{background:rgba(0,229,255,0.2);border-color:#00E5FF;box-shadow:0 0 14px rgba(0,229,255,0.35)}
.sbtn.on-save .sicon svg{stroke:#00E5FF;fill:rgba(0,229,255,0.2)}

/* ═══ LOADING ════════════════════════════════════════ */
.load-card{height:100vh;height:100dvh;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#080808}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,0.06);border-top-color:#FF2D6B;border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-card p{color:rgba(255,255,255,0.18);font-size:0.75rem}

/* ═══ SPLASH ══════════════════════════════════════════ */
#splash{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.45s}
.splash-logo{display:flex;align-items:center;gap:10px}
.splash-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#FF2D6B,#FF8C00);display:flex;align-items:center;justify-content:center}
.splash-icon svg{width:28px;height:28px}
.splash-title{font-family:'Bebas Neue',cursive;font-size:2.8rem;letter-spacing:4px;background:linear-gradient(90deg,#FF2D6B,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#splash small{color:rgba(255,255,255,0.18);font-size:0.72rem;letter-spacing:1.5px}
.swipe-cue{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:0.54rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.22);animation:bob 2s infinite;pointer-events:none;z-index:10}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}

/* ═══ TOAST ═══════════════════════════════════════════ */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:rgba(10,10,10,0.95);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:8px 20px;border-radius:24px;font-size:0.74rem;font-weight:600;z-index:999;white-space:nowrap;pointer-events:none;backdrop-filter:blur(18px);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1)}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ═══ BOTTOM SHEETS ═══════════════════════════════════ */
.bsheet{position:fixed;bottom:0;left:0;right:0;z-index:600;background:rgba(11,11,11,0.97);border-top:1px solid rgba(255,255,255,0.07);border-radius:22px 22px 0 0;backdrop-filter:blur(30px);transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1)}
.bsheet.open{transform:translateY(0)}
.bhandle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);margin:14px auto 16px}
#backdrop{display:none;position:fixed;inset:0;z-index:550;background:rgba(0,0,0,0.55);opacity:0;transition:opacity 0.3s}
#backdrop.on{display:block;opacity:1}
#share-sheet{padding:0 18px 36px}
.sh-title{font-size:0.9rem;font-weight:700;margin-bottom:14px}
.sh-url-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 12px;margin-bottom:18px}
.sh-url{flex:1;font-size:0.68rem;color:rgba(255,255,255,0.4);word-break:break-all;line-height:1.4}
.copy-btn{background:#FF2D6B;border:none;border-radius:10px;padding:6px 12px;color:#fff;font-size:0.68rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.sh-apps{display:flex;justify-content:space-around}
.sh-app{display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;color:#fff;flex:1}
.app-ic{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.45rem}
.sh-app span{font-size:0.57rem;color:rgba(255,255,255,0.38);font-weight:500}
#saved-sheet{padding:0 16px 36px;max-height:82vh;display:flex;flex-direction:column}
.sv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sv-header h2{font-size:0.9rem;font-weight:700}
.sv-badge{font-size:0.63rem;background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.25);color:#00E5FF;padding:3px 10px;border-radius:20px;font-weight:600}
#sv-list{overflow-y:auto;flex:1}
#sv-list::-webkit-scrollbar{display:none}
.sv-empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px 0}
.sv-empty .ei{font-size:2.8rem}
.sv-empty p{color:rgba(255,255,255,0.25);font-size:0.78rem;text-align:center;line-height:1.55}
.sv-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.sv-item:last-child{border-bottom:none}
.sv-poster{width:44px;height:62px;border-radius:8px;background:#1a1a1a;background-size:cover;background-position:center;flex-shrink:0;border:1px solid rgba(255,255,255,0.07)}
.sv-info{flex:1;min-width:0}
.sv-title{font-size:0.8rem;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sv-meta{font-size:0.65rem;color:rgba(255,255,255,0.3)}
.sv-del{width:28px;height:28px;border-radius:50%;background:rgba(255,45,107,0.08);border:1px solid rgba(255,45,107,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sv-del svg{width:12px;height:12px;stroke:#FF2D6B;stroke-width:2.5;fill:none;stroke-linecap:round}
.sv-del:active{background:rgba(255,45,107,0.25)}

/* ═══ SEARCH OVERLAY ══════════════════════════════════ */
#search-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.98);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.22s ease}
#search-overlay.open{opacity:1;pointer-events:all}
.so-top{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.07)}
.so-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.so-back svg{width:18px;height:18px;stroke:#fff;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.so-input-wrap{flex:1;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:14px;padding:10px 14px;transition:border-color 0.2s}
.so-input-wrap:focus-within{border-color:rgba(255,45,107,0.6)}
.so-input-wrap svg{width:15px;height:15px;stroke:rgba(255,255,255,0.35);stroke-width:2;fill:none;stroke-linecap:round;flex-shrink:0}
#so-input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:0.9rem;font-family:'Inter',sans-serif;caret-color:#FF2D6B}
#so-input::placeholder{color:rgba(255,255,255,0.22)}
.so-clear-btn{background:none;border:none;cursor:pointer;padding:2px;display:none}
.so-clear-btn.show{display:block}
.so-clear-btn svg{width:14px;height:14px;stroke:rgba(255,255,255,0.3);stroke-width:2.5;fill:none;stroke-linecap:round}
#so-results{flex:1;overflow-y:auto;padding:0 14px 20px}
#so-results::-webkit-scrollbar{display:none}
.so-sec{font-size:0.63rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);margin:16px 0 10px}

/* Category chips in search */
.cat-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:4px}
.cat-chips::-webkit-scrollbar{display:none}
.cat-chip{
  display:flex;align-items:center;gap:6px;
  white-space:nowrap;padding:8px 14px;
  border-radius:22px;border:1.5px solid;
  font-size:0.75rem;font-weight:700;
  cursor:pointer;transition:all 0.18s;flex-shrink:0;
  backdrop-filter:blur(8px);
}
.cat-chip:active{transform:scale(0.94)}

/* Genre grid */
.genre-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.genre-btn{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:10px 12px;cursor:pointer;transition:background 0.15s;
}
.genre-btn:active{background:rgba(255,255,255,0.1)}
.genre-emoji{font-size:1.2rem}
.genre-name{font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.75)}

/* Trending list */
.trend-item{
  display:flex;align-items:center;gap:12px;
  padding:9px 4px;border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;border-radius:10px;transition:background 0.15s;
}
.trend-item:last-child{border-bottom:none}
.trend-item:active{background:rgba(255,255,255,0.05)}
.trend-num{font-size:1rem;font-weight:800;color:rgba(255,255,255,0.15);width:24px;text-align:center;flex-shrink:0}
.trend-name{font-size:0.84rem;font-weight:500;color:rgba(255,255,255,0.75);flex:1}
.trend-arrow{color:rgba(255,255,255,0.2);font-size:0.8rem}

/* Search results */
.so-row{display:flex;align-items:center;gap:12px;padding:9px 4px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;border-radius:10px;transition:background 0.15s}
.so-row:last-child{border-bottom:none}
.so-row:active{background:rgba(255,255,255,0.05)}
.so-thumb{width:42px;height:58px;border-radius:8px;background:#1a1a1a;background-size:cover;background-position:center;flex-shrink:0;border:1px solid rgba(255,255,255,0.06)}
.so-info{flex:1;min-width:0}
.so-row-title{font-size:0.84rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.so-row-meta{font-size:0.67rem;color:rgba(255,255,255,0.32)}
.so-add{width:30px;height:30px;border-radius:50%;background:rgba(255,45,107,0.1);border:1px solid rgba(255,45,107,0.22);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.so-add svg{width:14px;height:14px;stroke:#FF2D6B;stroke-width:2.5;fill:none;stroke-linecap:round}
.so-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:50px 0}
.so-loading p{color:rgba(255,255,255,0.22);font-size:0.75rem}
.so-empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:50px 0;text-align:center}
.so-empty span{font-size:3rem}
.so-empty p{color:rgba(255,255,255,0.25);font-size:0.8rem;line-height:1.6}
.hl{color:#FF2D6B;font-weight:700}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">

/* ── localStorage ───────────────────────────────────── */
function getSaved(){try{return JSON.parse(localStorage.getItem('fz_saved')||'[]')}catch{return[]}}
function setSaved(a){localStorage.setItem('fz_saved',JSON.stringify(a))}
function isSaved(id){return getSaved().some(m=>m.imdbID===id)}
function saveM(m){const a=getSaved();if(!a.some(x=>x.imdbID===m.imdbID)){a.unshift({imdbID:m.imdbID,Title:m.Title,Year:m.Year,Poster:m.Poster,imdbRating:m.imdbRating});setSaved(a)}}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
async function omdb(p){

}

/* ── BUILD CARD ─────────────────────────────────────── */
function buildCard(m,idx,first,feedId){
  feedId=feedId||'main';
  const poster=m.Poster&&m.Poster!=='N/A'?m.Poster:'';
  const genres=(m.Genre||'').split(',').map(g=>g.trim()).filter(Boolean).slice(0,3);
  const rating=m.imdbRating!=='N/A'?m.imdbRating:'—';
  const plot=m.Plot!=='N/A'?m.Plot:'';
  const dir=m.Director!=='N/A'?m.Director.split(',')[0]:'—';
  const cast=m.Actors!=='N/A'?m.Actors.split(',').slice(0,3).join(', '):'—';
  const box=m.BoxOffice&&m.BoxOffice!=='N/A'?m.BoxOffice:'—';
  const awards=m.Awards&&m.Awards!=='N/A'?m.Awards.substring(0,65):'—';
  const sv=isSaved(m.imdbID);
  const ts=m.Title.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const uid=feedId+'-'+idx;

  const chips=genres.map((g,i)=>{
    const col=CHIP_COLORS[(idx*3+i)%CHIP_COLORS.length];
    return '<span class="chip" style="color:'+col.t+';border-color:'+col.t+';background:'+col.b+'">'+g+'</span>';
  }).join('');

  const card=document.createElement('div');
  card.className='card'; card.dataset.uid=uid; card.dataset.imdb=m.imdbID; card.dataset.feed=feedId;
  card.innerHTML=
    '<div class="card-bg" style="background-image:url(\''+poster+'\')"></div>'+
    '<div class="card-vignette"></div><div class="card-grad"></div><div class="card-top"></div>'+

      '<div class="card-genres">'+chips+'</div>'+
      '<div class="card-title">'+m.Title+'</div>'+
      '<div class="card-meta">'+
        '<span class="mrating">⭐ '+rating+'</span>'+
        '<div class="mdot"></div><span class="mmeta">'+(m.Year||'')+'</span>'+
        '<div class="mdot"></div><span class="mmeta">'+(m.Runtime||'')+'</span>'+

      '<button class="know-btn" onclick="expand(\''+uid+'\')"><span id="arr-'+uid+'">▾</span>&nbsp;Know More</button>'+

function doLike(uid){
  const b=document.getElementById('lb-'+uid);
  if(liked.has(uid)){liked.delete(uid);b&&b.classList.remove('on-like');showToast('Removed ♡')}
  else{liked.add(uid);b&&b.classList.add('on-like');showToast('❤️ Liked!')}
}
function doSave(uid,imdbID){
  const allMovies=[...movies,...catMovies];
  const m=allMovies.find(x=>x.imdbID===imdbID);
  if(!m) return;
  const b=document.getElementById('svb-'+uid);
  if(isSaved(imdbID)){
    unsaveM(imdbID);
    document.querySelectorAll('[id^="svb-"]').forEach(el=>{
      const card=el.closest('.card');
      if(card&&card.dataset.imdb===imdbID) el.classList.remove('on-save');
    });
    showToast('Removed from saved');
  } else {
    saveM(m);
    b&&b.classList.add('on-save');
    showToast('🔖 Saved — '+m.Title);
  }
  updateSvIcon();
}
function updateSvIcon(){
  const ic=document.getElementById('sv-icon');
  if(ic) ic.classList.toggle('has-saved',getSaved().length>0);
}

function openCatPage(catId){
  const cat=CATEGORIES.find(c=>c.id===catId)||{label:catId,ids:[],color:'#fff'};
  document.getElementById('cat-title-bar').textContent=cat.label;
  closeSearch();

  // reset cat feed
  const cf=document.getElementById('cat-feed');
  cf.innerHTML=''; catMovies=[]; catSeen=new Set(); catBusy=false;
  catPool=shuffle([...cat.ids]); catIdx=0;

  // show page
  document.getElementById('cat-page').classList.remove('hidden');
  catObs.disconnect();

  // load first batch
  loadCatBatch(cat,true);
}

function closeCatPage(){
  document.getElementById('cat-page').classList.add('hidden');
  catObs.disconnect();
}

async function loadCatBatch(cat,first){
  if(catBusy) return;
  catBusy=true;
  const cf=document.getElementById('cat-feed');

  // add loader
  const lc=document.createElement('div');
  lc.className='load-card'; lc.id='cat-lc';
  lc.innerHTML='<div class="spin"></div><p>Loading '+cat.label+'…</p>';
  cf.appendChild(lc);

  const toLoad=catPool.slice(catIdx,catIdx+4); catIdx+=4;
  if(catIdx>=catPool.length) catIdx=0; // loop

  const res=await Promise.allSettled(toLoad.map(id=>omdb({i:id})));
  document.getElementById('cat-lc')?.remove();

  let isFirst=first;
  res.forEach(r=>{
    if(r.status==='fulfilled'&&r.value&&!catSeen.has(r.value.imdbID)){
      catSeen.add(r.value.imdbID);
      const idx=catMovies.length;
      catMovies.push(r.value);
      const card=buildCard(r.value,idx,isFirst,'cat');
      cf.appendChild(card);
      catObs.observe(card);
      isFirst=false;
    }
  });
  catBusy=false;
}

const catObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    document.querySelectorAll('#cat-feed .card.active').forEach(c=>c.classList.remove('active'));
    e.target.classList.add('active');
    const idx=+e.target.dataset.uid?.split('-')[1]||0;
    if(idx>=catMovies.length-2&&!catBusy){
      const title=document.getElementById('cat-title-bar').textContent;
      const cat=CATEGORIES.find(c=>c.label===title)||CATEGORIES[0];
      loadCatBatch(cat,false);
    }
  });
},{threshold:0.55});

async function openGenre(q,name){
  closeSearch();

  // fetch from OMDB search
  try{
    const r=await fetch(BASE+'?'+new URLSearchParams({s:q,type:'movie',apikey:KEY}));
    const d=await r.json();
    if(d.Response==='True'&&d.Search){
      // Create pseudo-category
      const ids=d.Search.map(m=>m.imdbID);
      const pseudoCat={label:'🎭 '+name,ids,color:'#FF8C00'};
      document.getElementById('cat-title-bar').textContent=pseudoCat.label;
      const cf=document.getElementById('cat-feed');
      cf.innerHTML=''; catMovies=[]; catSeen=new Set(); catBusy=false;
      catPool=ids; catIdx=0;
      document.getElementById('cat-page').classList.remove('hidden');
      loadCatBatch(pseudoCat,true);
    }
  }catch{showToast('Failed to load')}
}

function openShare(id,title){
  const url='https://www.imdb.com/title/'+id;
  const text='🎬 '+title+'\n'+url;
  curUrl=url; curText=text;
  if(navigator.share){navigator.share({title,url}).catch(()=>showShareSheet());return}
  showShareSheet();
}
function showShareSheet(){
  document.getElementById('sh-url-txt').textContent=curUrl;
  document.getElementById('wa-l').href='https://wa.me/?text='+encodeURIComponent(curText);
  document.getElementById('tg-l').href='https://t.me/share/url?url='+encodeURIComponent(curUrl)+'&text='+encodeURIComponent(curText);
  document.getElementById('tw-l').href='https://twitter.com/intent/tweet?text='+encodeURIComponent(curText);
  document.getElementById('em-l').href='mailto:?subject='+encodeURIComponent('Check this movie!')+'&body='+encodeURIComponent(curText);
  openSheet('share-sheet');
}
function copyUrl(){
  const done=()=>{showToast('🔗 Copied!');closeAll()};
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(curUrl).then(done).catch(legacyCopy);return}
  legacyCopy();
}
function legacyCopy(){
  const el=document.getElementById('sh-url-txt');
  const r=document.createRange();r.selectNodeContents(el);
  window.getSelection().removeAllRanges();window.getSelection().addRange(r);
  try{document.execCommand('copy');showToast('🔗 Copied!');closeAll()}catch{showToast('Long press to copy')}
  window.getSelection().removeAllRanges();
}

function fuzzyScore(query,target){
  query=query.toLowerCase(); target=target.toLowerCase();
  if(target.includes(query)) return 100;
  const qw=query.split(/\s+/); let score=0;
  qw.forEach(qword=>{
    target.split(/\s+/).forEach(tw=>{
      if(tw.startsWith(qword)) score+=60;
      else if(tw.includes(qword)) score+=40;
      else{let m=0;for(let i=0;i<qword.length;i++)if(tw.includes(qword[i]))m++;score+=Math.round((m/Math.max(qword.length,tw.length))*30)}
    });
  });
  return score;
}
function highlight(text,query){
  if(!query) return text;
  const esc=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  try{return text.replace(new RegExp('('+esc+')','gi'),'<span class="hl">$1</span>')}catch{return text}
}

async function liveSearch(q){
  const el=document.getElementById('so-results');
  if(!q.trim()){renderExplore();return}
  el.innerHTML='<div class="so-loading"><div class="spin"></div><p>Searching...</p></div>';
  const ck=q.toLowerCase().trim();
  if(searchCache[ck]){renderResults(searchCache[ck],q);return}
  try{
    const r=await fetch(BASE+'?'+new URLSearchParams({s:q,type:'movie',apikey:KEY}));
    const d=await r.json();
    let results=[];
    if(d.Response==='True'&&d.Search&&d.Search.length){
      results=d.Search.map(m=>({...m,score:fuzzyScore(q,m.Title)})).sort((a,b)=>b.score-a.score).slice(0,8);
    }
    if(!results.length&&q.length>3){
      const r2=await fetch(BASE+'?'+new URLSearchParams({s:q.slice(0,-1),type:'movie',apikey:KEY}));
      const d2=await r2.json();
      if(d2.Response==='True'&&d2.Search&&d2.Search.length)
        results=d2.Search.slice(0,6).map(m=>({...m,score:50}));
    }
    searchCache[ck]=results;
    renderResults(results,q);
  }catch{el.innerHTML='<div class="so-empty"><span>😔</span><p>Search failed.</p></div>'}
}

function renderResults(results,q){
  const el=document.getElementById('so-results');
  if(!results.length){
    el.innerHTML='<div class="so-empty"><span>🎬</span><p>No results for<br/><b style="color:#fff">'+q+'</b><br/><small style="opacity:0.5">Try different spelling</small></p></div>';
    return;
  }
  el.innerHTML='<div class="so-sec">Results for "'+q+'"</div>'+
    results.map(m=>{
      const poster=m.Poster&&m.Poster!=='N/A'?m.Poster:'';
      return '<div class="so-row" onclick="addFromSearch(\''+m.imdbID+'\')">'+
        '<div class="so-thumb" style="background-image:url(\''+poster+'\')"></div>'+
        '<div class="so-info"><div class="so-row-title">'+highlight(m.Title,q)+'</div>'+
        '<div class="so-row-meta">'+(m.Year||'')+' &middot; Movie</div></div>'+
        '<div class="so-add"><svg viewBox="0 0 24 24" fill="none" stroke="#FF2D6B" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>'+
      '</div>';
    }).join('');
}

async function addFromSearch(imdbID){
  if(seen.has(imdbID)){showToast('Already in feed!');closeSearch();return}
  showToast('Loading…');
  const m=await omdb({i:imdbID});
  if(m){
    seen.add(m.imdbID); addCard(m);
    setTimeout(()=>document.querySelectorAll('#feed .card')[movies.length-1]?.scrollIntoView({behavior:'smooth'}),150);
    showToast('✅ '+m.Title);
    closeSearch();
  }
}

document.getElementById('so-input').addEventListener('input',function(){
  const v=this.value;
  document.getElementById('so-clear').classList.toggle('show',v.length>0);
  clearTimeout(searchTm);
  searchTm=setTimeout(()=>liveSearch(v),320);
});
document.getElementById('so-input').addEventListener('keydown',function(e){
  if(e.key==='Escape') closeSearch();
});

/* ── MAIN FEED ──────────────────────────────────────── */
function addCard(m,first=false){
  const idx=movies.length; movies.push(m);
  rmLoader();
  const card=buildCard(m,idx,first,'main');
  document.getElementById('feed').appendChild(card);
  mainObs.observe(card);
}
function addLoader(){
  if(document.getElementById('lc')) return;
  const lc=document.createElement('div');
  lc.className='load-card'; lc.id='lc';
  lc.innerHTML='<div class="spin"></div><p>Loading next movie…</p>';
  document.getElementById('feed').appendChild(lc);
}
function rmLoader(){document.getElementById('lc')?.remove()}

const mainObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    document.querySelectorAll('#feed .card.active').forEach(c=>c.classList.remove('active'));
    e.target.classList.add('active');
    const uid=e.target.dataset.uid;
    const idx=parseInt(uid?.split('-')[1]||'0');
    if(idx>=movies.length-2&&!busy) loadNext();
  });
},{threshold:0.55});

async function loadNext(){
  busy=true; addLoader();
  if(pIdx>=pool.length){pool=shuffle([...POOL]);pIdx=0}
  let m=null,t=0;
  while(!m&&t<20){
    const id=pool[pIdx++%pool.length]; t++;
    if(seen.has(id)) continue;
    m=await omdb({i:id});
    if(m) seen.add(m.imdbID);
  }
  if(m) addCard(m); else rmLoader();
  busy=false;
}

/* ── TOAST ──────────────────────────────────────────── */
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTm); toastTm=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ── INIT ───────────────────────────────────────────── */
(async()=>{
  updateSvIcon();
  const ids=shuffle([...POOL]).slice(0,8);
  const res=await Promise.allSettled(ids.map(id=>omdb({i:id})));
  let first=true;
  res.forEach(r=>{
    if(r.status==='fulfilled'&&r.value){
      seen.add(r.value.imdbID); addCard(r.value,first); first=false;
    }
  });
  const sp=document.getElementById('splash');
  sp.style.opacity='0';
  setTimeout(()=>sp.style.display='none',480);
})();
/* ── SERVICE WORKER REGISTRATION ────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('✅ FilmZilla SW registered:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}
</script>
